options:
  automapSubstitutions: true
# Variables
substitutions:
  _GITHUB_REPOSITORY: "Dnewe/purchase_predict_api.git" # Répertoire git sans github.com
steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: API Deploy
    entrypoint: 'bash'
    args: 
    - '-c'
    - |
        gcloud source repos clone purchase_predict_api /tmp/purchase_predict_api --project=$PROJECT_ID
        ls /tmp/purchase_predict_api
        git --git-dir=/tmp/purchase_predict_api/.git --work-tree=/tmp/purchase_predict_api checkout $BRANCH_NAME
        ls /tmp/purchase_predict_api
        gcloud builds submit \
          --config /tmp/purchase_predict_api/cloudbuild.yaml /tmp/purchase_predict_api \
          --substitutions=SHORT_SHA=$SHORT_SHA

          
logs_bucket: "gs://cours_mlops/logs_build_cloud_build"
timeout: 1200s
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-fgt-api/versions/latest
      env: GITHUB_FGT_API # Nom de la secret